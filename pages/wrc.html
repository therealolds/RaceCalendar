<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WRC Calendar 2025</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="RaceCalendar">
  <link rel="apple-touch-icon" href="../icons/app-icon.svg">
</head>

<body>
  <header class="page-header">
    <a href="../index.html" class="page-header__back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <span class="page-header__title">World Rally Championship</span>
  </header>

  <main>
    <section class="section tile bg-wrc">
      <div class="center-container">
        <h2><a href="https://www.wrc.com/en" target="_blank" rel="noopener noreferrer">World Rally Championship</a></h2>
        <span class="logo-panel">
          <img src="../logos/WRC.svg" alt="WRC logo" loading="lazy" />
        </span>
        <div id="next-wrc" class="next-race next-race--overlay">Loading...</div>
      </div>
    </section>
    <h1>World Rally Championship — 2025</h1>
    <div id="calendar" class="calendar-container">Loading races...</div>
    <div id="race-details" class="accordion" style="display: none;"></div>
  </main>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="../index.html" class="bottom-nav__item is-active" aria-current="page">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="tracks.html" class="bottom-nav__item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      <span>Tracks</span>
    </a>
    <a href="trivia.html" class="bottom-nav__item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Trivia</span>
    </a>
  </nav>

  <script src="../scripts/utils.js"></script>
  <script src="../scripts/render.js"></script>
  <script src="../scripts/calendar.js"></script>
  <script>
    loadNextRace('../calendars/wrc.json', 'next-wrc', false, { multiDay: true });
    loadFullCalendar('../calendars/wrc.json', 'calendar', true, { multiDay: true });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js');
    }
  </script>
</body>

</html>
