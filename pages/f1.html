<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formula 1 Calendar 2026</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="RaceCalendar">
  <link rel="apple-touch-icon" href="../icons/app-icon.svg">
</head>

<body>
  <header class="page-header">
    <a href="../index.html" class="page-header__back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <span class="page-header__title">Formula 1</span>
  </header>

  <main>
    <section class="section tile bg-f1">
      <div class="center-container">
        <h2><a href="https://www.formula1.com/" target="_blank" rel="noopener noreferrer">Formula 1</a></h2>
        <span class="logo-panel">
          <img src="../logos/F1.png" alt="Formula 1 logo" loading="lazy" />
        </span>
        <div id="next-f1" class="next-race next-race--overlay">Loading...</div>
      </div>
    </section>
    <h1>Formula 1 Calendar — 2026</h1>
    <div id="calendar" class="calendar-container">Loading races...</div>
    <div id="race-details" class="accordion" style="display: none;"></div>
  </main>

  <script src="../scripts/nav.js"></script>

  <script src="../scripts/utils.js"></script>
  <script src="../scripts/render.js"></script>
  <script src="../scripts/calendar.js"></script>
  <script>
    loadNextRace('../calendars/f1.json', 'next-f1', false);
    loadFullCalendar('../calendars/f1.json', 'calendar', true);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js');
    }
  </script>
</body>

</html>
