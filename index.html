<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RaceCalendar</title>
  <link rel="stylesheet" href="style.css">
  <script>try{document.documentElement.dataset.theme=localStorage.getItem("rc-theme")==="modern"?"modern":"vintage"}catch(e){}</script>
  <link rel="manifest" href="manifest.json">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fdfcf8">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1d1c19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="RaceCalendar">
  <link rel="apple-touch-icon" href="icons/app-icon.svg">
</head>

<body>
  <header class="app-header">
    <div class="wrap app-header__row">
      <h1 class="app-header__title">🏁 RaceCalendar</h1>
      <span class="app-header__tag">Made in Modena</span>
    </div>
    <div class="checker"></div>
  </header>

  <main class="wrap">
    <div class="toolbar">
      <div class="seg" data-active="1" role="group" aria-label="Today or this week">
        <span class="seg__thumb"></span>
        <button class="seg__btn" type="button" data-view="today" aria-pressed="false">Today</button>
        <button class="seg__btn is-active" type="button" data-view="week" aria-pressed="true">This Week</button>
      </div>
      <div class="toolbar__row">
        <div class="range-group">
          <label class="toolbar__range range-picker" for="range-input">
            <svg class="range-picker__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span class="range-picker__label" id="range-label"></span>
            <input type="date" id="range-input" class="range-picker__input" aria-label="Check another date for racing">
          </label>
          <button class="range-reset" type="button" id="range-reset" hidden>↺ Today</button>
        </div>
        <div class="chip-row">
          <button class="chip is-active" type="button" id="theme-chip" aria-pressed="true">♠ Vintage</button>
          <button class="chip is-active" type="button" id="featured-chip" aria-pressed="true">★ Featured only</button>
        </div>
      </div>
    </div>

    <section id="race-list" aria-live="polite">
      <div class="empty">Loading calendars…</div>
    </section>

    <h2 class="section-title">Coming up</h2>
    <section id="up-next" class="up-next-list">
      <div class="empty">Loading…</div>
    </section>

    <footer class="page-footer">
      All times are shown in your local timezone.<br>
      <a href="https://www.linkedin.com/in/therealolds/">Marco Vecchi</a> ·
      <a href="https://github.com/therealolds/RaceCalendar">GitHub</a>
    </footer>
  </main>

  <script type="module" src="scripts/page-home.js"></script>
</body>

</html>
