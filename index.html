<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RaceCalendar</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#101013">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="RaceCalendar">
  <link rel="apple-touch-icon" href="icons/app-icon.svg">
</head>

<body>
  <header class="app-header">
    <div class="wrap app-header__row">
      <h1 class="app-header__title">🏁 RaceCalendar</h1>
      <span class="app-header__tag">Made in Modena</span>
    </div>
    <div class="checker"></div>
  </header>

  <main class="wrap">
    <div class="toolbar">
      <div class="seg" data-active="1" role="group" aria-label="Today or this week">
        <span class="seg__thumb"></span>
        <button class="seg__btn" type="button" data-view="today" aria-pressed="false">Today</button>
        <button class="seg__btn is-active" type="button" data-view="week" aria-pressed="true">This Week</button>
      </div>
      <div class="toolbar__row">
        <span class="toolbar__range" id="range-label"></span>
        <button class="chip is-active" type="button" id="featured-chip" aria-pressed="true">★ Featured only</button>
      </div>
    </div>

    <section id="race-list" aria-live="polite">
      <div class="empty">Loading calendars…</div>
    </section>

    <h2 class="section-title">Coming up</h2>
    <section id="up-next" class="up-next-list">
      <div class="empty">Loading…</div>
    </section>

    <footer class="page-footer">
      All times are shown in your local timezone.<br>
      <a href="https://www.linkedin.com/in/therealolds/">Marco Vecchi</a> ·
      <a href="https://github.com/therealolds/RaceCalendar">GitHub</a>
    </footer>
  </main>

  <script type="module" src="scripts/page-home.js"></script>
</body>

</html>
