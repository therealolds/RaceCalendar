<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RaceCalendar</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <!-- Dark mode support: automatic via prefers-color-scheme -->
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0b0b">
  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="RaceCalendar">
  <link rel="apple-touch-icon" href="icons/app-icon.svg">
</head>

<body>
  <header class="site-header">
    <nav>
      <ul class="topbar">
        <li><a href="https://github.com/therealolds/RaceCalendar">RaceCalendar on GitHub</a></li>
        <li class="welcome">Made in Modena</li>
      </ul>
    </nav>
  </header>

  <main class="home-grid">
    <!-- TODAY -->
    <section id="TODAY" class="section section--full">
      <div class="center-container">
        <h1 id="racing-view-title">Racing This Week</h1>
        <div class="view-toggle" role="group" aria-label="Racing view toggle">
          <button class="view-toggle__btn" type="button" data-view="today" aria-pressed="false">Today</button>
          <button class="view-toggle__btn is-active" type="button" data-view="week" aria-pressed="true">This Week</button>
        </div>
        <div class="filter-toggle" role="group" aria-label="Featured filter toggle">
          <button class="filter-toggle__btn view-toggle__btn" type="button" data-filter="all" aria-pressed="false">All</button>
          <button class="filter-toggle__btn view-toggle__btn is-active" type="button" data-filter="featured" aria-pressed="true">Only Featured</button>
        </div>
        <div id="today-races" class="today-list series-grid" hidden aria-hidden="true">Loading...</div>
        <div id="week-races" class="today-list series-grid">Loading...</div>
      </div>
    </section>

    <!-- Featured -->
    <section class="section--full tag-section" id="section-featured">
      <div class="center-container">
        <h2>Featured</h2>
        <div class="series-grid" id="grid-featured"></div>
      </div>
    </section>

    <!-- Motorsport -->
    <section class="section--full tag-section" id="section-motorsport">
      <div class="center-container">
        <h2>Motorsport</h2>
        <div class="series-grid" id="grid-motorsport"></div>
      </div>
    </section>

    <!-- Sailing and boats-->
    <section class="section--full tag-section" id="section-nautical">
      <div class="center-container">
        <h2>Sailing & Nautical</h2>
        <div class="series-grid" id="grid-nautical"></div>
      </div>
    </section>
  </main>

  <script src="scripts/series.js"></script>
  <script src="scripts/utils.js"></script>
  <script src="scripts/render.js"></script>
  <script src="scripts/calendar.js"></script>
  <script src="scripts/home.js"></script>

  <footer>
    <p class="footer-credit"><a href="https://www.linkedin.com/in/therealolds/">Author: Marco Vecchi</a></p>
  </footer>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="index.html" class="bottom-nav__item is-active" aria-current="page">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="pages/tracks.html" class="bottom-nav__item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      <span>Tracks</span>
    </a>
    <a href="pages/trivia.html" class="bottom-nav__item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Trivia</span>
    </a>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

</body>



</html>
