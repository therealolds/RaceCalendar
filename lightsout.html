<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lights Out — RaceCalendar</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preload" href="fonts/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin>
  <script>try{document.documentElement.dataset.theme=localStorage.getItem("rc-theme")==="modern"?"modern":"vintage"}catch(e){}</script>
  <link rel="manifest" href="manifest.json">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fdfcf8">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1d1c19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="RaceCalendar">
  <link rel="apple-touch-icon" href="icons/app-icon.svg">
</head>

<body>
  <header class="page-head">
    <a href="games.html" class="page-head__back" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="page-head__title">Lights Out</span>
  </header>

  <main class="wrap" style="padding-top:16px">
    <div class="lights-stage" id="stage" role="button" tabindex="0"
      aria-label="Reaction test. Tap or press space to start, then tap again the instant the lights go out.">
      <div class="lights-gantry" id="gantry" aria-hidden="true"></div>
      <div class="lights-clock" id="clock">0.000</div>
      <div class="lights-msg" id="msg">Tap to start</div>
    </div>

    <p class="lights-best" id="best" hidden></p>

    <section class="lights-help">
      <p>The five lights come on one by one. When they all go out — tap!
        The stopwatch measures your reaction time. Tap too early and it’s
        a jump start. An F1 driver reacts in about 0.2 seconds.</p>
    </section>

    <footer class="page-footer">It’s lights out and away we go!</footer>
  </main>

  <script type="module" src="scripts/page-lightsout.js"></script>
</body>

</html>
